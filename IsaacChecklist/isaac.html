<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Binding of Isaac - Master Checklist</title>

    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #eee;
            --tainted-bg: #050000;
            --hardmode-color: #aa0000; 
            --normal-color: #444;      
            --border-color: #333;
            --table-header-bg: #111;
            --row-hover: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            transition: background-color 0.5s ease, box-shadow 0.5s ease;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none; 
        }

        body.tainted-mode {
            background-color: var(--tainted-bg);
            box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.95);
            --border-color: #220000;
            --table-header-bg: #000;
            --row-hover: #1a0000;
        }

        header {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 3px solid var(--border-color);
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 2px;
        }

        .instructions {
            color: #aaa;
            font-size: 1.2rem;
            margin: 5px 0;
        }

        .tainted-indicator {
            color: #ff3333;
            display: none;
        }

        body.tainted-mode .tainted-indicator { display: inline; }

        /* Search Bar */
        #search-bar {
            padding: 8px 15px;
            margin: 5px auto;
            width: 80%;
            max-width: 400px;
            background: #222;
            border: 2px solid #444;
            color: #eee;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            border-radius: 4px;
            display: block;
            transition: border-color 0.2s;
        }

        #search-bar:focus {
            outline: none;
            border-color: #888;
        }

        /* Layout Container */
        #main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #table-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }

        /* Target Sidebar */
        #target-sidebar {
            width: 300px;
            background: rgba(10, 10, 10, 0.9);
            border-left: 3px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: background-color 0.5s ease;
        }

        #target-sidebar h2 {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin: 15px 0 0 0;
            color: gold;
        }

        #target-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .target-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .target-item:hover {
            border-color: #ff3333;
            background: rgba(255, 0, 0, 0.1);
        }

        .target-icon {
            width: 30px;
            height: 30px;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .target-info {
            display: flex;
            flex-direction: column;
        }

        .target-item-name { color: gold; font-size: 1.2rem; line-height: 1.1; }
        .target-char-name { color: #aaa; font-size: 0.9rem; }

        /* Table */
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1300px;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        thead {
            position: sticky;
            top: 0;
            background-color: var(--table-header-bg);
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }

        th { font-size: 1.3rem; color: #ccc; text-transform: uppercase; }

        th:first-child, td:first-child {
            position: sticky;
            left: 0;
            background-color: var(--table-header-bg);
            z-index: 4;
            text-align: left;
            font-size: 1.5rem;
            padding-left: 15px;
            width: 220px;
        }

        td:first-child {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            border-right: 3px solid var(--border-color);
        }

        body.tainted-mode td:first-child { background-color: var(--tainted-bg); }
        tbody tr:hover { background-color: var(--row-hover); }

        .char-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            object-fit: contain;
            image-rendering: pixelated; 
        }

        .mark-header-icon {
            width: 35px;
            height: 35px;
            margin: 0 auto 5px auto;
            object-fit: contain;
            display: block;
            image-rendering: pixelated;
        }

        .mark-cell { width: 55px; }

        .checkbox {
            width: 40px;
            height: 40px;
            margin: 0 auto;
            background-color: #111;
            border: 2px solid #444;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            background-size: 80%;
            background-repeat: no-repeat;
            background-position: center;
            image-rendering: pixelated;
        }

        .checkbox:hover { border-color: #888; }

        /* Search Highlight/Dimming logic */
        .checkbox.dimmed {
            opacity: 0.2;
            filter: grayscale(100%);
        }

        /* Target Outline Logic */
        .checkbox.targeted {
            border: 2px solid gold;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.8), inset 0 0 5px rgba(255, 215, 0, 0.5);
        }

        .hold-fill {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 0%;
            background-color: rgba(255, 0, 0, 0.4);
            transition: height 0.1s linear;
            pointer-events: none;
        }

        .checkbox.normal {
            background-color: var(--normal-color);
            border-color: #888;
        }

        .checkbox.hard {
            background-color: #2a0000;
            border-color: #ff3333;
            box-shadow: inset 0 0 10px var(--hardmode-color), 0 0 8px var(--hardmode-color);
        }

        .checkbox.hard.targeted {
            border-color: gold; /* Target overrides hard border */
        }

        .hundred-percent-box {
            width: 45px;
            height: 45px;
            margin: 0 auto;
            background: #111;
            border: 2px dashed #444;
            border-radius: 50%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #888;
        }

        .hundred-percent-box.achieved {
            background-color: var(--hardmode-color);
            border: 2px solid #ff3333;
            box-shadow: 0 0 15px #ff3333;
            color: #fff;
            font-weight: bold;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Tooltip Styling */
        #tooltip {
            position: absolute;
            background: rgba(15, 10, 10, 0.95);
            border: 2px solid #4a3b32;
            color: #e0d8c8;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.1s;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            text-shadow: 1px 1px 0 #000;
        }
        #tooltip.visible { opacity: 1; }
        .tooltip-sub { font-size: 1rem; color: #888; margin-top: 2px; display: block; }
        .tooltip-gold { color: gold; }
    </style>
</head>

        }

        // Target Data (Uses a new auxilliary key so it doesn't break main saves)
        let targets = JSON.parse(localStorage.getItem('isaacMasterTargetsV1')) || [];

        const tableHeaderRow = document.getElementById('table-header-row');
        const tableBody = document.getElementById('table-body');
        const tooltip = document.getElementById('tooltip');
        const searchBar = document.getElementById('search-bar');
        const targetList = document.getElementById('target-list');

        function init() {
            renderHeaders();
            renderTable();
            renderSidebar();

            document.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'e' && document.activeElement !== searchBar) toggleTainted();
            });

            searchBar.addEventListener('input', handleSearch);
        }

        function save() {
            localStorage.setItem('isaacMasterSaveDataV4', JSON.stringify(saveData));
        }

        function saveTargets() {
            localStorage.setItem('isaacMasterTargetsV1', JSON.stringify(targets));
            renderSidebar();
        }

        function toggleTainted() {
            isTainted = !isTainted;
            if (isTainted) document.body.classList.add('tainted-mode');
            else document.body.classList.remove('tainted-mode');
            renderTable(); 
            handleSearch(); // Re-apply search filter
        }

        // Helps figure out the exact string for searching and displaying
        function getUnlockName(char, mark, isTaintedChar) {
            if (isTaintedChar) {
                if (path1Marks.includes(mark)) return taintedUnlocks[char]["Path1"];
                if (path2Marks.includes(mark)) return taintedUnlocks[char]["Path2"];
                if (mark === "Greed") return taintedUnlocks[char]["Greedier"];
                if (mark === "Mom's Heart") return "No Unlock";
                return taintedUnlocks[char][mark];
            } else {
                if (mark === "Greed") return normalUnlocks[char]["Greed"] + " / " + normalUnlocks[char]["Greedier"];
                return normalUnlocks[char][mark];
            }
        }

        // Calculates points for 100% circle (24 total points possible per char)
        function getCompletionStats(charData) {
            let points = 0;
            marks.forEach(m => {
                if (charData[m] === 1) points += 1;
                if (charData[m] === 2) points += 2;
            });
            const percent = Math.floor((points / 24) * 100);
            return { points, percent };
        }

        function renderHeaders() {
            let html = `<th>Character</th>`;
            marks.forEach(mark => {
                const markPrefix = markFiles[mark];
                html += `
                    <th title="${mark}">
                        <img src="images/marks/Completion_${markPrefix}_Hard.webp" class="mark-header-icon" onerror="this.style.display='none'">
                        <div style="font-size: 0.9rem;">${mark}</div>
                    </th>
                `;
            });
            html += `<th>100%</th>`;
            tableHeaderRow.innerHTML = html;
        }

        // Allows Tooltips to Dynamically update (e.g. if you check a box, the percentage updates immediately)
        function attachTooltip(element, getTextFn) {
            element.addEventListener('mouseenter', () => {
                tooltip.innerHTML = getTextFn();
                tooltip.classList.add('visible');
            });

            element.addEventListener('mousemove', (e) => {
                const tooltipWidth = tooltip.offsetWidth;
                const tooltipHeight = tooltip.offsetHeight;
                let x = e.pageX + 15;
                let y = e.pageY + 15;
                
                if (x + tooltipWidth > window.innerWidth) x = e.pageX - tooltipWidth - 15;
                if (y + tooltipHeight > window.innerHeight) y = e.pageY - tooltipHeight - 15;
                
                tooltip.style.left = x + 'px';
                tooltip.style.top = y + 'px';
            });

            element.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });
        }

        function renderSidebar() {
            targetList.innerHTML = '';
            if (targets.length === 0) {
                targetList.innerHTML = '<div style="padding: 20px; color: #666; text-align: center;">Right-click any mark to add it to your goals!</div>';
                return;
            }

            targets.forEach((t, index) => {
                const itemName = getUnlockName(t.char, t.mark, t.isTainted);
                const prefix = t.isTainted ? "Tainted " : "";
                const markPrefix = markFiles[t.mark];
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'target-item';
                itemDiv.innerHTML = `
                    <img src="images/marks/Completion_${markPrefix}_Hard.webp" class="target-icon" onerror="this.style.display='none'">
                    <div class="target-info">
                        <span class="target-item-name">${itemName}</span>
                        <span class="target-char-name">${prefix}${t.char} - ${t.mark}</span>
                    </div>
                `;
                
                // Clicking it removes it from targets
                itemDiv.addEventListener('click', () => {
                    targets.splice(index, 1);
                    saveTargets();
                    renderTable(); // Refresh table to remove gold outline
                });

                targetList.appendChild(itemDiv);
            });
        }

        function renderTable() {
            tableBody.innerHTML = '';

            characters.forEach(char => {
                const tr = document.createElement('tr');
                tr.dataset.char = char; // For search function
                
                const charData = isTainted ? saveData[char].tainted : saveData[char].normal;
                const charPrefix = isTainted ? "Tainted " : "";
                
                const charFileName = isTainted ? taintedCharFiles[char] : normalCharFiles[char];
                const charImagePath = `images/characters/${charFileName}.webp`;

                const tdChar = document.createElement('td');
                tdChar.innerHTML = `
                    <img src="${charImagePath}" class="char-icon" alt="${charPrefix}${char}" onerror="this.style.display='none'">
                    <span>${charPrefix}${char}</span>
                `;
                tr.appendChild(tdChar);

                // Percentage Box
                const hundredPercentTd = document.createElement('td');
                const hundredPercentBox = document.createElement('div');
                hundredPercentBox.className = 'hundred-percent-box';
                hundredPercentTd.appendChild(hundredPercentBox);

                // Setup 100% tooltip and display
                attachTooltip(hundredPercentTd, () => {
                    const stats = getCompletionStats(charData);
                    const item = isTainted ? `Death Certificate<br><span class="tooltip-sub">(Requires all marks on ALL Tainted Characters)</span>` : normalUnlocks[char]["100%"];
                    return `Completion: ${stats.percent}% (${stats.points}/24)<br>Item: <span class="tooltip-gold">${item}</span>`;
                });

                marks.forEach(mark => {
                    const tdMark = document.createElement('td');
                    tdMark.className = 'mark-cell';
                    
                    const checkbox = document.createElement('div');
                    checkbox.className = 'checkbox';
                    
                    // Add attributes for the search function
                    const unlockName = getUnlockName(char, mark, isTainted);
                    checkbox.dataset.itemName = unlockName;
                    checkbox.dataset.markName = mark;
                    
                    const fill = document.createElement('div');
                    fill.className = 'hold-fill';
                    checkbox.appendChild(fill);

                    updateCheckboxVisual(checkbox, mark, charData[mark], char, isTainted);

                    // Dynamic Tooltip Setup
                    attachTooltip(tdMark, () => {
                        let text = "";
                        if (isTainted) {
                            if (path1Marks.includes(mark)) text = `${taintedUnlocks[char]["Path1"]}<br><span class="tooltip-sub">(Requires Isaac, ???, Satan, & The Lamb)</span>`;
                            else if (path2Marks.includes(mark)) text = `${taintedUnlocks[char]["Path2"]}<br><span class="tooltip-sub">(Requires Boss Rush & Hush)</span>`;
                            else if (mark === "Greed") text = `Greed: None<br>Greedier: <span class="tooltip-gold">${taintedUnlocks[char]["Greedier"]}</span>`;
                            else if (mark === "Mom's Heart") text = "<span style='color: #888;'>No individual unlock</span>";
                            else text = `<span class="tooltip-gold">${taintedUnlocks[char][mark]}</span>`;
                        } else {
                            if (mark === "Greed") text = `Greed: <span style="color: #aaa">${normalUnlocks[char]["Greed"]}</span><br>Greedier: <span style="color: #ff5555">${normalUnlocks[char]["Greedier"]}</span>`;
                            else text = `<span class="tooltip-gold">${normalUnlocks[char][mark]}</span>`;
                        }
                        return text;
                    });

                    // Hold System Logic
                    let isHolding = false;
                    let holdTimer;

                    const startHold = (e) => {
                        if (e.type !== 'touchstart' && e.button !== 2) e.preventDefault();
                        if (e.button === 2) return; // Ignore right click for holding

                        isHolding = true;
                        fill.style.transition = `height ${holdDuration}ms linear`;
                        fill.style.height = '100%';

                        holdTimer = setTimeout(() => {
                            charData[mark] = charData[mark] === 2 ? 0 : 2;
                            updateCheckboxVisual(checkbox, mark, charData[mark], char, isTainted);
                            check100Percent(charData, hundredPercentBox);
                            save();
                            isHolding = false;
                        }, holdDuration);
                    };

                    const endHold = (e) => {
                        if (e && e.button === 2) return;
                        if (!isHolding) return;
                        clearTimeout(holdTimer);
                        fill.style.transition = 'none';
                        fill.style.height = '0%';
                        isHolding = false;

                        charData[mark] = charData[mark] === 1 ? 0 : 1;
                        updateCheckboxVisual(checkbox, mark, charData[mark], char, isTainted);
                        check100Percent(charData, hundredPercentBox);
                        save();
                    };

                    const cancelHold = () => {
                        if (!isHolding) return;
                        clearTimeout(holdTimer);
                        fill.style.transition = 'none';
                        fill.style.height = '0%';
                        isHolding = false;
                    };

                    // Setup Right-Click to Target
                    checkbox.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        const isTargeted = targets.some(t => t.char === char && t.isTainted === isTainted && t.mark === mark);
                        if (isTargeted) {
                            targets = targets.filter(t => !(t.char === char && t.isTainted === isTainted && t.mark === mark));
                            checkbox.classList.remove('targeted');
                        } else {
                            targets.push({ char, isTainted, mark });
                            checkbox.classList.add('targeted');
                        }
                        saveTargets();
                    });

                    checkbox.addEventListener('mousedown', startHold);
                    checkbox.addEventListener('mouseup', endHold);
                    checkbox.addEventListener('mouseleave', cancelHold);
                    checkbox.addEventListener('touchstart', startHold, {passive: true});
                    checkbox.addEventListener('touchend', endHold);
                    checkbox.addEventListener('touchcancel', cancelHold);

                    tdMark.appendChild(checkbox);
                    tr.appendChild(tdMark);
                });

                check100Percent(charData, hundredPercentBox);
                tr.appendChild(hundredPercentTd);
                tableBody.appendChild(tr);
            });
        }

        // Handles applying classes, images, and gold target borders
        function updateCheckboxVisual(element, mark, state, charName, taintedState) {
            element.classList.remove('normal', 'hard', 'targeted');
            element.style.backgroundImage = 'none';
            
            const markPrefix = markFiles[mark];

            // Check if targeted
            const isTargeted = targets.some(t => t.char === charName && t.isTainted === taintedState && t.mark === mark);
            if (isTargeted) element.classList.add('targeted');

            if (state === 1) {
                element.classList.add('normal');
                element.style.backgroundImage = `url('images/marks/Completion_${markPrefix}.webp')`;
            } else if (state === 2) {
                element.classList.add('hard');
                element.style.backgroundImage = `url('images/marks/Completion_${markPrefix}_Hard.webp')`;
            }
            
            element.querySelector('.hold-fill').style.height = '0%'; 
        }

        function check100Percent(charData, hundredPercentElement) {
            const stats = getCompletionStats(charData);
            hundredPercentElement.innerText = `${stats.percent}%`;
            
            if (stats.percent === 100) hundredPercentElement.classList.add('achieved');
            else hundredPercentElement.classList.remove('achieved');
        }

        // Fast filtering logic for the Search Bar
        function handleSearch() {
            const term = searchBar.value.toLowerCase();
            const rows = document.querySelectorAll('#table-body tr');
            
            rows.forEach(row => {
                let rowHasMatch = false;
                const charName = row.dataset.char.toLowerCase();
                const charPrefix = isTainted ? "tainted " : "";
                const fullCharName = charPrefix + charName;
                
                if (fullCharName.includes(term)) rowHasMatch = true;

                const cells = row.querySelectorAll('.mark-cell');
                cells.forEach(cell => {
                    const box = cell.querySelector('.checkbox');
                    const itemName = box.dataset.itemName.toLowerCase();
                    const markName = box.dataset.markName.toLowerCase();
                    
                    if (term === "" || itemName.includes(term) || fullCharName.includes(term) || markName.includes(term)) {
                        box.classList.remove('dimmed');
                        rowHasMatch = true;
                    } else {
                        box.classList.add('dimmed');
                    }
                });

                row.style.display = rowHasMatch || term === "" ? '' : 'none';
            });
        }

        init();
    </script>
</body>
</html>
